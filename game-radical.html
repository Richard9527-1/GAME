<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>偏旁对决 - GAME</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #d5e0ec;
            --bg-card: #ffffff;
            --text-primary: #2a3a4a;
            --text-secondary: #6a7e92;
            --text-light: #9aaeC2;
            --accent: #e8a035;
            --border-color: #bcc8d6;
            --shadow: 0 4px 20px rgba(42, 58, 74, 0.12);
            --shadow-hover: 0 8px 36px rgba(42, 58, 74, 0.20);
            --radius: 20px;
            --radius-sm: 12px;
            --success: #7bcb7a;
            --success-bg: #eaf5ea;
            --error: #e86b6b;
            --error-bg: #f5eaea;
            --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        [data-theme="dark"] {
            --bg-primary: #080c18;
            --bg-card: #141c30;
            --text-primary: #e8edf5;
            --text-secondary: #8899b8;
            --text-light: #556688;
            --accent: #00c8e8;
            --border-color: #1e2a44;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
            --shadow-hover: 0 8px 40px rgba(0, 200, 232, 0.10);
            --success: #00d4a0;
            --success-bg: #0a2a22;
            --error: #ff6b8a;
            --error-bg: #2a0a18;
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 820px;
            width: 100%;
            margin: 0 auto;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            transition: background 0.3s, border 0.3s;
        }

        .game-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stats {
            display: flex;
            gap: 14px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .stats .num {
            font-weight: 700;
            color: var(--text-primary);
        }

        .mode-toggle {
            display: flex;
            gap: 4px;
            background: var(--bg-primary);
            border-radius: 30px;
            padding: 4px;
            border: 1px solid var(--border-color);
        }
        .mode-toggle button {
            padding: 4px 14px;
            border: none;
            border-radius: 30px;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.3s, color 0.3s;
        }
        .mode-toggle button.active {
            background: var(--accent);
            color: #fff;
        }

        .content {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            min-height: 320px;
            transition: background 0.3s, border 0.3s;
        }

        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn-back {
            padding: 8px 18px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s, border 0.3s, color 0.3s;
        }
        .btn-back:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .btn-secondary {
            padding: 8px 18px;
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.3s, border 0.3s, color 0.3s;
        }
        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .btn-primary {
            padding: 10px 28px;
            background: var(--accent);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 14px rgba(232, 160, 53, 0.2);
            transition: background 0.3s;
        }
        [data-theme="dark"] .btn-primary {
            color: #080c18;
        }
        .btn-primary:active {
            transform: scale(0.96);
        }

        /* ===== 开始界面 ===== */
        .start-screen {
            text-align: center;
            padding: 20px 10px;
        }
        .start-screen .icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }
        .start-screen h2 {
            font-size: 1.6rem;
            margin-bottom: 4px;
            color: var(--text-primary);
        }
        .start-screen .desc {
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .diff-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 480px;
            margin: 0 auto 16px;
        }
        .diff-card {
            padding: 14px 10px;
            background: var(--bg-primary);
            border: 3px solid var(--border-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .diff-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .diff-card .d-icon {
            font-size: 1.8rem;
        }
        .diff-card .d-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
        }
        .diff-card .d-grade {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .diff-card .d-desc {
            font-size: 0.65rem;
            color: var(--text-light);
        }
        .diff-card.selected {
            border-color: var(--accent);
            background: var(--accent-light);
        }
        [data-theme="dark"] .diff-card.selected {
            background: rgba(0, 200, 232, 0.15);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        /* ===== 单人 ===== */
        .single-area {
            max-width: 480px;
            margin: 0 auto;
        }
        .single-area .q-big {
            font-size: 3rem;
            font-weight: 800;
            text-align: center;
            padding: 16px 0 12px;
            color: var(--text-primary);
        }
        .single-area .opts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .single-area .opt {
            padding: 14px;
            background: var(--bg-primary);
            border: 3px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            cursor: pointer;
            font-family: inherit;
            text-align: center;
            transition: background 0.3s, border 0.3s, color 0.3s;
        }
        .single-area .opt:hover:not(.disabled) {
            border-color: var(--accent);
            transform: scale(1.03);
        }
        .single-area .opt.correct {
            border-color: var(--success);
            background: var(--success-bg);
        }
        .single-area .opt.wrong {
            border-color: var(--error);
            background: var(--error-bg);
        }
        .single-area .opt.disabled {
            cursor: not-allowed;
            opacity: 0.4;
        }
        .single-area .progress {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        /* ===== 双人 ===== */
        .duel-container {
            display: flex;
            flex-direction: column;
            gap: 0;
            background: var(--bg-primary);
            border-radius: var(--radius);
            overflow: hidden;
            border: 2px solid var(--border-color);
            min-height: 460px;
        }

        .duel-player {
            flex: 1;
            padding: 8px 14px 6px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--bg-card);
        }
        .duel-player.bottom {
            border-top: 2px solid var(--border-color);
        }
        .duel-player.top {
            transform: rotate(180deg);
            border-bottom: 2px solid var(--border-color);
        }
        .duel-player.top .duel-inner {
            transform: none;
        }
        .duel-inner {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .duel-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 0.8rem;
            padding: 0 2px;
            color: var(--text-primary);
        }
        .duel-row .pname.p1 {
            color: #e8a035;
        }
        .duel-row .pname.p2 {
            color: #5b9bd5;
        }
        [data-theme="dark"] .duel-row .pname.p1 {
            color: #ffb300;
        }
        [data-theme="dark"] .duel-row .pname.p2 {
            color: #00b0ff;
        }
        .duel-row .pscore {
            font-size: 1rem;
            background: var(--bg-primary);
            padding: 1px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .duel-q {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            padding: 4px 0 2px;
            color: var(--text-primary);
        }

        .duel-opts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            max-width: 360px;
            margin: 0 auto;
            width: 100%;
        }
        .duel-opt {
            padding: 8px 6px;
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            cursor: pointer;
            font-family: inherit;
            text-align: center;
            min-height: 40px;
            transition: background 0.3s, border 0.3s, color 0.3s;
        }
        .duel-opt:hover:not(.disabled) {
            border-color: var(--accent);
            transform: scale(1.02);
        }
        .duel-opt.correct {
            border-color: var(--success);
            background: var(--success-bg);
        }
        .duel-opt.wrong {
            border-color: var(--error);
            background: var(--error-bg);
        }
        .duel-opt.disabled {
            cursor: not-allowed;
            opacity: 0.4;
        }

        .duel-middle {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 6px 16px;
            background: var(--bg-primary);
            border-top: 2px solid var(--border-color);
            border-bottom: 2px solid var(--border-color);
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--text-secondary);
            flex-shrink: 0;
            gap: 12px;
        }
        .duel-middle .mid-left {
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
            flex: 1;
        }
        .duel-middle .mid-left .num {
            font-size: 1.8rem;
            font-weight: 900;
            color: #e8a035;
            min-width: 32px;
            text-align: center;
        }
        [data-theme="dark"] .duel-middle .mid-left .num {
            color: #ffb300;
        }
        .duel-middle .mid-right {
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-start;
            flex: 1;
            transform: rotate(180deg);
        }
        .duel-middle .mid-right .num {
            font-size: 1.8rem;
            font-weight: 900;
            color: #5b9bd5;
            min-width: 32px;
            text-align: center;
        }
        [data-theme="dark"] .duel-middle .mid-right .num {
            color: #00b0ff;
        }
        .duel-middle .vs {
            font-size: 1.6rem;
            color: var(--accent);
            font-weight: 900;
        }
        .duel-middle .prog {
            font-size: 0.65rem;
            color: var(--text-light);
            padding: 1px 8px;
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .duel-status {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-light);
            min-height: 16px;
            padding-top: 2px;
        }
        .duel-status.ok {
            color: var(--success);
        }
        .duel-status.fail {
            color: var(--error);
        }

        /* ===== 弹窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 28px 24px 24px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
            text-align: center;
            border: 1px solid var(--border-color);
            max-height: 90vh;
            overflow-y: auto;
            transition: background 0.3s, border 0.3s;
        }
        .modal .m-icon {
            font-size: 3.2rem;
            margin-bottom: 4px;
        }
        .modal h2 {
            font-size: 1.4rem;
            margin-bottom: 2px;
            color: var(--text-primary);
        }
        .modal .m-score {
            font-size: 2.6rem;
            font-weight: 900;
            color: var(--accent);
            margin: 4px 0;
        }
        .modal .m-detail {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .modal .m-rank {
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            margin: 8px 0 14px;
            font-size: 0.85rem;
            text-align: left;
        }
        .modal .m-rank .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .modal .m-rank .rank-item:last-child {
            border-bottom: none;
        }
        .modal .m-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .header {
                padding: 10px 12px;
                flex-direction: column;
                align-items: stretch;
                gap: 4px;
            }
            .game-name {
                text-align: center;
                font-size: 1rem;
            }
            .stats {
                justify-content: center;
                font-size: 0.7rem;
                gap: 10px;
            }
            .mode-toggle {
                justify-content: center;
            }
            .content {
                padding: 14px 10px;
                min-height: 240px;
            }
            .single-area .q-big {
                font-size: 2.4rem;
            }
            .single-area .opt {
                font-size: 1.2rem;
                padding: 12px;
            }
            .duel-player {
                padding: 6px 10px 4px;
                min-height: 120px;
            }
            .duel-q {
                font-size: 1.6rem;
            }
            .duel-opt {
                font-size: 1.1rem;
                padding: 6px 4px;
                min-height: 34px;
            }
            .duel-middle .mid-left .num,
            .duel-middle .mid-right .num {
                font-size: 1.5rem;
                min-width: 26px;
            }
            .duel-middle .vs {
                font-size: 1.3rem;
            }
            .diff-grid {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 6px;
            }
            .diff-card {
                padding: 10px 6px;
            }
            .diff-card .d-icon {
                font-size: 1.4rem;
            }
            .diff-card .d-name {
                font-size: 0.8rem;
            }
            .modal {
                padding: 20px 16px;
            }
            .modal .m-score {
                font-size: 2rem;
            }
            .start-screen .icon {
                font-size: 3rem;
            }
            .start-screen h2 {
                font-size: 1.3rem;
            }
            .btn-primary {
                padding: 8px 20px;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 400px) {
            .single-area .q-big {
                font-size: 2rem;
            }
            .single-area .opt {
                font-size: 1rem;
                padding: 10px;
            }
            .duel-q {
                font-size: 1.3rem;
            }
            .duel-opt {
                font-size: 0.95rem;
                min-height: 30px;
            }
            .duel-middle .mid-left .num,
            .duel-middle .mid-right .num {
                font-size: 1.2rem;
                min-width: 22px;
            }
            .duel-player {
                padding: 4px 6px 2px;
                min-height: 100px;
            }
            .diff-grid {
                grid-template-columns: 1fr;
                gap: 4px;
            }
        }

        @media (min-width: 768px) and (orientation: landscape) {
            .duel-container {
                flex-direction: row;
                min-height: 360px;
            }
            .duel-player.bottom {
                border-top: none;
                border-left: 2px solid var(--border-color);
            }
            .duel-player.top {
                transform: rotate(180deg);
                border-bottom: none;
                border-right: 2px solid var(--border-color);
            }
            .duel-middle {
                flex-direction: column;
                padding: 10px 8px;
                border-top: none;
                border-bottom: none;
                border-left: 2px solid var(--border-color);
                border-right: 2px solid var(--border-color);
                min-width: 60px;
                gap: 4px;
            }
            .duel-middle .mid-left {
                justify-content: center;
                flex: none;
                flex-direction: column;
                gap: 2px;
            }
            .duel-middle .mid-right {
                justify-content: center;
                flex: none;
                flex-direction: column;
                gap: 2px;
                transform: rotate(180deg);
            }
            .duel-middle .vs {
                font-size: 1.6rem;
            }
            .duel-middle .prog {
                margin-left: 0;
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="game-name">✍️ 偏旁对决</div>
            <div class="stats">
                <span>🏆 最高连对: <span class="num" id="bestScore">0</span></span>
                <span>📊 当前: <span class="num" id="currentStreak">0</span></span>
            </div>
            <div class="mode-toggle" id="modeToggle">
                <button class="active" data-mode="single">🧑 单人</button>
                <button data-mode="double">👫 双人</button>
            </div>
        </header>

        <div class="content" id="gameContent"></div>

        <div class="bottom-bar">
            <a class="btn-back" href="index.html">← 返回主菜单</a>
            <button class="btn-secondary" id="resetBtn">🔄 重新开始</button>
        </div>
    </div>

    <div class="modal-overlay" id="resultModal">
        <div class="modal" id="resultModalContent"></div>
    </div>

    <script src="data/radical-data.js"></script>
    <script>
        // ============================================================
        // 偏旁对决 - 完整版（含组合题）
        // ============================================================

        // ----- 夜间模式同步 -----
        function applyTheme() {
            var saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        }
        applyTheme();

        window.addEventListener('storage', function(e) {
            if (e.key === 'theme') applyTheme();
        });

        var lastTheme = localStorage.getItem('theme') || 'light';
        setInterval(function() {
            var current = localStorage.getItem('theme') || 'light';
            if (current !== lastTheme) {
                lastTheme = current;
                applyTheme();
            }
        }, 2000);

        // ----- DOM -----
        var $content = document.getElementById('gameContent');
        var $best = document.getElementById('bestScore');
        var $streak = document.getElementById('currentStreak');
        var $resetBtn = document.getElementById('resetBtn');
        var $modal = document.getElementById('resultModal');
        var $modalContent = document.getElementById('resultModalContent');

        // ----- 工具 -----
        function shuffle(arr) {
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = arr[i];
                arr[i] = arr[j];
                arr[j] = temp;
            }
            return arr;
        }

        function getBestScore(key) {
            try {
                var data = localStorage.getItem('rank_' + key);
                var list = data ? JSON.parse(data) : [];
                if (list.length === 0) return 0;
                var max = 0;
                for (var i = 0; i < list.length; i++) {
                    if (list[i].score > max) max = list[i].score;
                }
                return max;
            } catch (e) { return 0; }
        }

        function saveRank(key, score) {
            try {
                var data = localStorage.getItem('rank_' + key);
                var list = data ? JSON.parse(data) : [];
                list.push({ score: score, time: Date.now() });
                if (list.length > 50) list.shift();
                localStorage.setItem('rank_' + key, JSON.stringify(list));
            } catch (e) {}
        }

        function getRankList(key, limit) {
            try {
                var data = localStorage.getItem('rank_' + key);
                var list = data ? JSON.parse(data) : [];
                list.sort(function(a, b) { return b.score - a.score; });
                return list.slice(0, limit || 10);
            } catch (e) { return []; }
        }

        // ============================================================
        // 游戏逻辑
        // ============================================================

        var DIFFICULTIES = {
            easy: { label: '⭐ 简单', grade: '1-2年级', desc: '常见偏旁', icon: '🌟' },
            medium: { label: '⭐⭐ 中等', grade: '3-4年级', desc: '多偏旁+易混淆', icon: '⚡' },
            hard: { label: '⭐⭐⭐ 困难', grade: '5-6年级', desc: '复杂偏旁+易混', icon: '🔥' }
        };

        var currentDifficulty = 'easy';
        var mode = 'single';
        var gameRunning = false;

        var singleIndex = 0,
            singleStreak = 0,
            singleBest = 0;
        var singleQuestions = [];
        var singleAnswered = false;

        var DOUBLE_TOTAL = 20;
        var doubleQuestions = [];
        var doubleIndex = 0;
        var p1Score = 0,
            p2Score = 0;
        var p1Answered = false,
            p2Answered = false;
        var p1Correct = false,
            p2Correct = false;
        var p1Locked = false,
            p2Locked = false;
        var currentQ1 = null,
            currentQ2 = null;

        function getQuestions(diff, count) {
            var bank = RADICAL_QUESTIONS[diff] || RADICAL_QUESTIONS.easy;
            var shuffled = shuffle(bank.slice(0));
            return shuffled.slice(0, count || Math.min(shuffled.length, 100));
        }

        function refillSingle() {
            var newQs = getQuestions(currentDifficulty, 30);
            singleQuestions = singleQuestions.concat(newQs);
        }

        function render() {
            if (!gameRunning) { renderStartScreen(); return; }
            if (mode === 'single') renderSingle();
            else renderDouble();
        }

        function renderStartScreen() {
            var key = 'radical_' + currentDifficulty;
            $best.textContent = getBestScore(key);
            $streak.textContent = '0';

            var diffHtml = '';
            var keys = Object.keys(DIFFICULTIES);
            for (var i = 0; i < keys.length; i++) {
                var k = keys[i];
                var d = DIFFICULTIES[k];
                var selected = k === currentDifficulty ? 'selected' : '';
                diffHtml += '<div class="diff-card ' + selected + '" data-diff="' + k + '">';
                diffHtml += '<div class="d-icon">' + d.icon + '</div>';
                diffHtml += '<div class="d-name">' + d.label + '</div>';
                diffHtml += '<div class="d-grade">' + d.grade + '</div>';
                diffHtml += '<div class="d-desc">' + d.desc + '</div>';
                diffHtml += '</div>';
            }

            $content.innerHTML =
                '<div class="start-screen">' +
                '<div class="icon">✍️</div>' +
                '<h2>偏旁对决</h2>' +
                '<p class="desc">选择难度，开始挑战！</p>' +
                '<div class="diff-grid">' + diffHtml + '</div>' +
                '<div class="btn-group">' +
                '<button class="btn-primary" onclick="startGame(\'single\')">🧑 单人闯关</button>' +
                '<button class="btn-primary" onclick="startGame(\'double\')" style="background:#6a9fc8;">👫 双人对战</button>' +
                '</div>' +
                '<div style="margin-top:12px;font-size:0.8rem;color:var(--text-secondary);">' +
                (mode === 'single' ? '单人：无限闯关，错一题淘汰' : '双人：共20题，各自独立答题') +
                '</div>' +
                '</div>';

            var cards = document.querySelectorAll('.diff-card');
            for (var i = 0; i < cards.length; i++) {
                (function(card) {
                    card.addEventListener('click', function() {
                        var diff = this.dataset.diff;
                        if (diff === currentDifficulty) return;
                        currentDifficulty = diff;
                        var allCards = document.querySelectorAll('.diff-card');
                        for (var j = 0; j < allCards.length; j++) {
                            allCards[j].classList.remove('selected');
                        }
                        this.classList.add('selected');
                        if (gameRunning) {
                            gameRunning = false;
                            resetGame();
                        }
                        var key = 'radical_' + currentDifficulty;
                        $best.textContent = getBestScore(key);
                    });
                })(cards[i]);
            }
        }

        // ----- 单人 -----
        function renderSingle() {
            while (singleIndex >= singleQuestions.length) {
                refillSingle();
            }
            if (singleQuestions.length === 0) {
                singleQuestions = getQuestions(currentDifficulty, 30);
            }
            var q = singleQuestions[singleIndex % singleQuestions.length];
            currentQ1 = q;

            var key = 'radical_' + currentDifficulty;
            $best.textContent = singleBest;
            $streak.textContent = singleStreak;

            var optHtml = '';
            for (var i = 0; i < q.options.length; i++) {
                var opt = q.options[i];
                var disabled = singleAnswered ? 'disabled' : '';
                optHtml += '<button class="opt" data-value="' + opt + '" ' + disabled + '>' + opt + '</button>';
            }

            // ★★★ 判断题型标签 ★★★
            var typeTag = '';
            if (q.type === '组合') {
                typeTag = '🧩 组合';
            } else {
                typeTag = '✍️ 偏旁';
            }

            $content.innerHTML =
                '<div class="single-area">' +
                '<div class="progress">' + typeTag + ' · 第 ' + (singleIndex + 1) + ' 题</div>' +
                '<div class="q-big">' + q.question + '</div>' +
                '<div class="opts-grid">' + optHtml + '</div>' +
                '<div style="text-align:center;margin-top:10px;font-size:0.85rem;color:var(--text-secondary);">' +
                '✅ 连对: <strong style="color:var(--accent);font-size:1.2rem;">' + singleStreak + '</strong> 题' +
                '</div>' +
                '</div>';

            if (!singleAnswered) {
                var btns = document.querySelectorAll('.opt');
                for (var i = 0; i < btns.length; i++) {
                    (function(btn) {
                        btn.addEventListener('click', function() {
                            handleSingleAnswer(this.dataset.value);
                        });
                    })(btns[i]);
                }
            }
        }

        function handleSingleAnswer(value) {
            if (singleAnswered || !gameRunning) return;
            var q = currentQ1;
            var correct = String(value) === String(q.answer);
            singleAnswered = true;

            var btns = document.querySelectorAll('.opt');
            for (var i = 0; i < btns.length; i++) {
                var btn = btns[i];
                btn.classList.add('disabled');
                var val = btn.dataset.value;
                if (String(val) === String(q.answer)) btn.classList.add('correct');
                if (String(val) === String(value) && !correct) btn.classList.add('wrong');
            }

            if (correct) {
                singleStreak++;
                var key = 'radical_' + currentDifficulty;
                if (singleStreak > singleBest) {
                    singleBest = singleStreak;
                    saveRank(key, singleBest);
                    $best.textContent = singleBest;
                }
                $streak.textContent = singleStreak;
                setTimeout(function() {
                    singleIndex++;
                    singleAnswered = false;
                    render();
                }, 600);
            } else {
                showResult(singleStreak);
            }
        }

        // ----- 双人 -----
        function renderDouble() {
            if (doubleQuestions.length === 0) {
                var pool = getQuestions(currentDifficulty, 50);
                doubleQuestions = shuffle(pool).slice(0, DOUBLE_TOTAL);
                if (doubleQuestions.length === 0) {
                    doubleQuestions = shuffle(RADICAL_QUESTIONS.easy.slice(0)).slice(0, DOUBLE_TOTAL);
                }
                doubleIndex = 0;
                p1Score = 0;
                p2Score = 0;
                p1Answered = false;
                p2Answered = false;
                p1Locked = false;
                p2Locked = false;
            }

            if (doubleIndex >= DOUBLE_TOTAL) {
                showDoubleResult();
                return;
            }

            var q1 = doubleQuestions[doubleIndex % doubleQuestions.length];
            var q2 = doubleQuestions[doubleIndex % doubleQuestions.length];
            currentQ1 = q1;
            currentQ2 = q2;

            var p1Display = p1Locked ? '🎉 等待下一题...' : (p1Answered ? (p1Correct ? '✅ 答对了！' : '❌ 再试一次') :
                '👆 点击选择');
            var p2Display = p2Locked ? '🎉 等待下一题...' : (p2Answered ? (p2Correct ? '✅ 答对了！' : '❌ 再试一次') :
                '👆 点击选择');
            var p1Cls = p1Locked ? 'ok' : (p1Answered ? (p1Correct ? 'ok' : 'fail') : '');
            var p2Cls = p2Locked ? 'ok' : (p2Answered ? (p2Correct ? 'ok' : 'fail') : '');

            var opts1 = '';
            for (var i = 0; i < q1.options.length; i++) {
                var opt = q1.options[i];
                var disabled = (p1Locked || p1Answered) ? 'disabled' : '';
                opts1 += '<button class="duel-opt" data-value="' + opt + '" ' + disabled + '>' + opt + '</button>';
            }

            var opts2 = '';
            for (var i = 0; i < q2.options.length; i++) {
                var opt = q2.options[i];
                var disabled = (p2Locked || p2Answered) ? 'disabled' : '';
                opts2 += '<button class="duel-opt" data-value="' + opt + '" ' + disabled + '>' + opt + '</button>';
            }

            // ★★★ 双人进度显示题型图标 ★★★
            var typeIcon1 = q1.type === '组合' ? '🧩' : '✍️';
            var typeIcon2 = q2.type === '组合' ? '🧩' : '✍️';

            $content.innerHTML =
                '<div class="duel-container">' +
                '<div class="duel-player top">' +
                '<div class="duel-inner">' +
                '<div class="duel-row"><span class="pname p2">🧑 玩家 2</span><span class="pscore">' + p2Score +
                ' 分</span></div>' +
                '<div class="duel-q">' + q2.question + '</div>' +
                '<div class="duel-opts">' + opts2 + '</div>' +
                '<div class="duel-status ' + p2Cls + '">' + p2Display + '</div>' +
                '</div></div>' +
                '<div class="duel-middle">' +
                '<span class="mid-left"><span class="num">' + p1Score + '</span></span>' +
                '<span class="vs">⚔️</span>' +
                '<span class="mid-right"><span class="num">' + p2Score + '</span></span>' +
                '<span class="prog">' + typeIcon1 + ' ' + (doubleIndex + 1) + '/' + DOUBLE_TOTAL + '</span>' +
                '</div>' +
                '<div class="duel-player bottom">' +
                '<div class="duel-inner">' +
                '<div class="duel-row"><span class="pname p1">🧑 玩家 1</span><span class="pscore">' + p1Score +
                ' 分</span></div>' +
                '<div class="duel-q">' + q1.question + '</div>' +
                '<div class="duel-opts">' + opts1 + '</div>' +
                '<div class="duel-status ' + p1Cls + '">' + p1Display + '</div>' +
                '</div></div>' +
                '</div>';

            if (!p1Locked && !p1Answered) {
                var btns1 = document.querySelectorAll('.duel-player.bottom .duel-opt');
                for (var i = 0; i < btns1.length; i++) {
                    (function(btn) {
                        btn.addEventListener('click', function() {
                            handleDoubleAnswer(1, this.dataset.value);
                        });
                    })(btns1[i]);
                }
            }

            if (!p2Locked && !p2Answered) {
                var btns2 = document.querySelectorAll('.duel-player.top .duel-opt');
                for (var i = 0; i < btns2.length; i++) {
                    (function(btn) {
                        btn.addEventListener('click', function() {
                            handleDoubleAnswer(2, this.dataset.value);
                        });
                    })(btns2[i]);
                }
            }

            var key = 'radical_' + currentDifficulty;
            $best.textContent = getBestScore(key);
            $streak.textContent = p1Score + ' vs ' + p2Score;
        }

        function handleDoubleAnswer(player, value) {
            if (!gameRunning) return;

            if (player === 1) {
                if (p1Locked || p1Answered) return;
                var q = currentQ1;
                var correct = String(value) === String(q.answer);
                p1Answered = true;
                p1Correct = correct;

                var btns = document.querySelectorAll('.duel-player.bottom .duel-opt');
                for (var i = 0; i < btns.length; i++) {
                    var btn = btns[i];
                    btn.classList.add('disabled');
                    var val = btn.dataset.value;
                    if (String(val) === String(q.answer)) btn.classList.add('correct');
                    if (String(val) === String(value) && !correct) btn.classList.add('wrong');
                }

                if (correct) {
                    p1Score++;
                    p1Locked = true;
                    updateDoubleUI();
                    setTimeout(function() {
                        doubleIndex++;
                        p1Answered = false;
                        p2Answered = false;
                        p1Locked = false;
                        p2Locked = false;
                        p1Correct = false;
                        p2Correct = false;
                        render();
                    }, 600);
                } else {
                    setTimeout(function() {
                        p1Answered = false;
                        p1Correct = false;
                        render();
                    }, 400);
                }
            } else {
                if (p2Locked || p2Answered) return;
                var q = currentQ2;
                var correct = String(value) === String(q.answer);
                p2Answered = true;
                p2Correct = correct;

                var btns = document.querySelectorAll('.duel-player.top .duel-opt');
                for (var i = 0; i < btns.length; i++) {
                    var btn = btns[i];
                    btn.classList.add('disabled');
                    var val = btn.dataset.value;
                    if (String(val) === String(q.answer)) btn.classList.add('correct');
                    if (String(val) === String(value) && !correct) btn.classList.add('wrong');
                }

                if (correct) {
                    p2Score++;
                    p2Locked = true;
                    updateDoubleUI();
                    setTimeout(function() {
                        doubleIndex++;
                        p1Answered = false;
                        p2Answered = false;
                        p1Locked = false;
                        p2Locked = false;
                        p1Correct = false;
                        p2Correct = false;
                        render();
                    }, 600);
                } else {
                    setTimeout(function() {
                        p2Answered = false;
                        p2Correct = false;
                        render();
                    }, 400);
                }
            }

            updateDoubleUI();
            $streak.textContent = p1Score + ' vs ' + p2Score;
        }

        function updateDoubleUI() {
            var l = document.querySelector('.duel-middle .mid-left .num');
            var r = document.querySelector('.duel-middle .mid-right .num');
            if (l) l.textContent = p1Score;
            if (r) r.textContent = p2Score;
            var s1 = document.querySelector('.duel-player.bottom .pscore');
            var s2 = document.querySelector('.duel-player.top .pscore');
            if (s1) s1.textContent = p1Score + ' 分';
            if (s2) s2.textContent = p2Score + ' 分';
            var prog = document.querySelector('.duel-middle .prog');
            if (prog) prog.textContent = (doubleIndex + 1) + '/' + DOUBLE_TOTAL;
            $streak.textContent = p1Score + ' vs ' + p2Score;
        }

        // ----- 结果 -----
        function showResult(score) {
            gameRunning = false;
            var key = 'radical_' + currentDifficulty;
            var rankList = getRankList(key, 5);

            var icon, title, detail;
            if (score >= 20) { icon = '🏆';
                title = '太厉害了！';
                detail = '你是偏旁小达人！'; } else if (score >= 10) { icon = '🌟';
                title = '表现优秀！'; } else if (score >= 5) { icon = '💪';
                title = '再接再厉！'; } else if (score >= 3) { icon = '📖';
                title = '继续加油！'; } else { icon = '🌱';
                title = '开始你的偏旁之旅！'; }

            var rankHtml = rankList.length > 0 ? '' :
                '<div style="text-align:center;color:var(--text-secondary);padding:8px 0;">暂无记录</div>';
            for (var i = 0; i < rankList.length; i++) {
                rankHtml += '<div class="rank-item"><span>#' + (i + 1) + '</span><span>' + rankList[i].score +
                    ' 连对</span></div>';
            }

            $modalContent.innerHTML =
                '<div class="m-icon">' + icon + '</div>' +
                '<h2>' + title + '</h2>' +
                '<div class="m-score">' + score + '</div>' +
                '<div class="m-detail">' + detail + ' (' + DIFFICULTIES[currentDifficulty].label + ')</div>' +
                '<div class="m-rank"><div style="font-weight:700;margin-bottom:6px;">🏅 积分榜 (最高连对)</div>' +
                rankHtml + '</div>' +
                '<div class="m-actions">' +
                '<button class="btn-primary" onclick="closeResult(); startGame(\'single\');">🔄 再来一局</button>' +
                '<button class="btn-secondary" onclick="closeResult(); resetGame();">🏠 返回</button>' +
                '</div>';
            $modal.classList.add('active');
        }

        function showDoubleResult() {
            gameRunning = false;
            var winner = p1Score > p2Score ? '🏆 玩家1 获胜！' :
                (p2Score > p1Score ? '🏆 玩家2 获胜！' : '🤝 平局！');

            $modalContent.innerHTML =
                '<div class="m-icon">' + (p1Score > p2Score ? '🎉' : (p2Score > p1Score ? '🎉' : '🤝')) + '</div>' +
                '<h2>' + winner + '</h2>' +
                '<div style="display:flex;justify-content:center;gap:30px;margin:12px 0;">' +
                '<div><span style="color:#e8a035;">🧑 玩家1</span> <strong style="font-size:2rem;">' + p1Score +
                '</strong></div>' +
                '<div style="font-size:1.5rem;color:var(--accent);">⚔️</div>' +
                '<div><span style="color:#5b9bd5;">🧑 玩家2</span> <strong style="font-size:2rem;">' + p2Score +
                '</strong></div>' +
                '</div>' +
                '<div class="m-detail">' + DIFFICULTIES[currentDifficulty].label + ' · 共 ' + DOUBLE_TOTAL +
                ' 题</div>' +
                '<div class="m-actions">' +
                '<button class="btn-primary" onclick="closeResult(); startGame(\'double\');">🔄 再来一局</button>' +
                '<button class="btn-secondary" onclick="closeResult(); resetGame();">🏠 返回</button>' +
                '</div>';
            $modal.classList.add('active');
        }

        function closeResult() { $modal.classList.remove('active'); }

        // ----- 控制 -----
        function startGame(m) {
            mode = m;
            gameRunning = true;
            singleAnswered = false;
            p1Answered = false;
            p2Answered = false;
            p1Locked = false;
            p2Locked = false;

            var btns = document.querySelectorAll('#modeToggle button');
            for (var i = 0; i < btns.length; i++) {
                btns[i].classList.toggle('active', btns[i].dataset.mode === m);
            }

            if (m === 'single') {
                singleIndex = 0;
                singleStreak = 0;
                var key = 'radical_' + currentDifficulty;
                singleBest = getBestScore(key);
                singleQuestions = [];
                refillSingle();
                if (singleQuestions.length === 0) {
                    singleQuestions = getQuestions(currentDifficulty, 30);
                }
                $best.textContent = singleBest;
                $streak.textContent = '0';
            } else {
                doubleIndex = 0;
                p1Score = 0;
                p2Score = 0;
                p1Answered = false;
                p2Answered = false;
                p1Locked = false;
                p2Locked = false;
                var pool = getQuestions(currentDifficulty, 50);
                doubleQuestions = shuffle(pool).slice(0, DOUBLE_TOTAL);
                if (doubleQuestions.length === 0) {
                    doubleQuestions = shuffle(RADICAL_QUESTIONS.easy.slice(0)).slice(0, DOUBLE_TOTAL);
                }
                var key = 'radical_' + currentDifficulty;
                $best.textContent = getBestScore(key);
                $streak.textContent = '0 vs 0';
            }
            render();
        }

        function resetGame() {
            gameRunning = false;
            singleAnswered = false;
            p1Answered = false;
            p2Answered = false;
            p1Locked = false;
            p2Locked = false;
            singleIndex = 0;
            singleStreak = 0;
            p1Score = 0;
            p2Score = 0;
            doubleIndex = 0;
            $streak.textContent = '0';
            renderStartScreen();
        }

        // ----- 事件绑定 -----
        var modeBtns = document.querySelectorAll('#modeToggle button');
        for (var i = 0; i < modeBtns.length; i++) {
            (function(btn) {
                btn.addEventListener('click', function() {
                    var m = this.dataset.mode;
                    if (m === mode && gameRunning) return;
                    gameRunning = false;
                    resetGame();
                    mode = m;
                    var allBtns = document.querySelectorAll('#modeToggle button');
                    for (var j = 0; j < allBtns.length; j++) {
                        allBtns[j].classList.toggle('active', allBtns[j].dataset.mode === m);
                    }
                    renderStartScreen();
                    setTimeout(function() { startGame(m); }, 300);
                });
            })(modeBtns[i]);
        }

        $resetBtn.addEventListener('click', function() {
            if (confirm('确定重新开始吗？')) { resetGame();
                renderStartScreen(); }
        });

        var resizeTimer;
        window.addEventListener('resize', function() {
            if (gameRunning && mode === 'double') {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() { render(); }, 300);
            }
        });

        $modal.addEventListener('click', function(e) {
            if (e.target === this) closeResult();
        });

        // ============================================================
        // 启动
        // ============================================================
        console.log('✍️ 偏旁对决已加载');
        console.log('✅ 题库: 简单=' + RADICAL_QUESTIONS.easy.length +
            ' 中等=' + RADICAL_QUESTIONS.medium.length +
            ' 困难=' + RADICAL_QUESTIONS.hard.length);

        renderStartScreen();
        var key = 'radical_' + currentDifficulty;
        $best.textContent = getBestScore(key);
    </script>
</body>
</html>
